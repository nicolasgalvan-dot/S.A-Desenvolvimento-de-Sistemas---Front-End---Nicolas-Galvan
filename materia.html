<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matéria — Portfólio</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="src/styles/materia.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>

    <nav class="navbar">
        <a href="portfolio_nicolas (1).html" class="voltar-home-btn">← Início</a>
        <span class="logo-nome">Portfolio 2026</span>
        <div class="logo-escola" style="margin-left: auto;">
            <img src="sesi-logo-1.png" alt="Logo da Escola">
        </div>
        <button class="theme-toggle" id="themeToggle" onclick="toggleDarkMode()" title="Alternar modo escuro">
            <span class="theme-icon" id="themeIcon">🌙</span>
        </button>
    </nav>

    <!-- Banner da matéria -->
    <header class="materia-banner">
        <div class="hero-content">
            <h1 id="titulo-materia">Carregando...</h1>
            <div class="linha-dourada"></div>
        </div>
    </header>

    <!-- Conteúdo principal -->
    <main class="section-container">
        <!-- Seletor de trimestres -->
        <div class="trimester-selector" id="trimester-selector">
            <button class="trimester-btn active" data-trimester="1">
                <span class="tri-number">1º</span>
                <span class="tri-label">Trimestre</span>
            </button>
            <button class="trimester-btn locked" data-trimester="2">
                <span class="tri-number">2º</span>
                <span class="tri-label">Trimestre</span>
            </button>
            <button class="trimester-btn locked" data-trimester="3">
                <span class="tri-number">3º</span>
                <span class="tri-label">Trimestre</span>
            </button>
        </div>

        <!-- Grid de atividades -->
        <div class="activities-grid" id="activities-grid">
            <!-- Preenchido via JS -->
        </div>
    </main>

    <footer class="materia-footer">
        <a href="portfolio_nicolas (1).html" class="footer-back-link">← Voltar ao Portfólio</a>
    </footer>

    <a href="#" class="back-to-top" id="backToTop" title="Voltar ao topo">↑</a>

    <script src="src/data/activities.js"></script>
    <script src="src/materia-page.js"></script>
    <script src="script.js"></script>
</body>
</html>
